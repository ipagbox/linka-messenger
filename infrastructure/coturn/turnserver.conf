listening-port=3478
tls-listening-port=5349

fingerprint
lt-cred-mech

realm=localhost
server-name=localhost

# Static auth secret (shared with Synapse)
static-auth-secret=change-me-in-production

# Log
log-file=/tmp/turnserver.log
verbose

# Allow loopback (dev only)
allow-loopback-peers

# No TLS in dev
no-tls
no-dtls

# Disable multicast
no-multicast-peers
