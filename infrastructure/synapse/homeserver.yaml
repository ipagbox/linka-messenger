server_name: "localhost"
pid_file: /data/homeserver.pid

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    resources:
      - names: [client, federation]
        compress: false

database:
  name: psycopg2
  args:
    host: db-synapse
    database: synapse
    user: synapse
    password: "synapse_password"
    cp_min: 5
    cp_max: 10

log_config: "/config/log.config"

media_store_path: /data/media_store

registration_shared_secret: "generate-me-change-in-production"

report_stats: false

macaroon_secret_key: "generate-me-change-in-production"

form_secret: "generate-me-change-in-production"

signing_key_path: "/data/homeserver.signing.key"

trusted_key_servers:
  - server_name: "matrix.org"

enable_registration: false
enable_registration_without_verification: false

# Admin API
allow_guest_access: false

# Media retention
media_retention:
  local_media_lifetime: 30d

# Rate limiting
rc_message:
  per_second: 0.2
  burst_count: 10

rc_registration:
  per_second: 0.17
  burst_count: 3

rc_login:
  address:
    per_second: 0.17
    burst_count: 3
  account:
    per_second: 0.17
    burst_count: 3
  failed_attempts:
    per_second: 0.17
    burst_count: 3

# Enable E2EE
encryption_enabled_by_default_for_room_type: all

# Push notifications
push:
  include_content: false
